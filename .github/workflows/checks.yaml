name: Checks
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  tests:
    strategy:
      matrix:
        python-version:
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          # for convenience, install into the global env,
          # rather than wrestle with virtualenvs,
          # e.g. for installing bits in tests/end_to_end/data/install_all.sh
          cache: pip
          cache-dependency-path: Pipfile.lock
      - name: Install pipenv
        run: |
          pip install pipenv
          pipenv requirements --categories dev-packages > requirements.txt
          pip install --requirement requirements.txt
      - name: run tests
        run: coverage run --module pytest
      - name: report coverage
        run: coverage report
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: Pipfile.lock
      - name: Install pipenv
        run: |
          pip install pipenv
          pip install --requirement <(pipenv requirements --categories dev-packages)
      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd  # v3.0.1
